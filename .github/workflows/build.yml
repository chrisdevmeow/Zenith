name: Build Zenith (Windows)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Clone JUCE
      run: git clone --depth 1 --branch 7.0.5 https://github.com/juce-framework/JUCE.git
    
    - name: Build Release
      run: |
        cmake -Bbuild-release -DCMAKE_BUILD_TYPE=Release
        cmake --build build-release --config Release
    
    - name: Upload Release VST3
      uses: actions/upload-artifact@v4
      with:
        name: Zenith-Release
        path: build-release/Zenith_artefacts/Release/VST3/Zenith.vst3
    
    - name: Upload Standalone
      uses: actions/upload-artifact@v4
      with:
        name: Zenith-Standalone
        path: build-release/Zenith_artefacts/Release/Standalone/Zenith.exe
