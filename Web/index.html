<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Zenith · WASM Test</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: #18182a; color: #e0d8f0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem; }
        #app { background: #22223b; border-radius: 2rem; padding: 1.5rem; max-width: 700px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        h1 { font-weight: 300; letter-spacing: -0.02em; margin-bottom: 0.3rem; font-size: 1.6rem; }
        h1 span { font-weight: 700; color: #c084fc; }
        .status { opacity: 0.6; font-size: 0.85rem; margin-bottom: 1rem; }
        .row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.8rem; }
        button { background: #c084fc; color: #18182a; border: none; padding: 0.5rem 1.2rem; border-radius: 2rem; font-weight: 600; cursor: pointer; flex: 1; min-width: 70px; font-size: 0.9rem; }
        button:active { transform: scale(0.96); }
        .knob-group { display: flex; flex-direction: column; align-items: center; gap: 0.1rem; margin-bottom: 0.4rem; }
        .knob-group label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.7; }
        input[type="range"] { width: 100%; accent-color: #c084fc; background: #2e2e4a; height: 4px; border-radius: 4px; }
        .grid-3 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.6rem; margin-bottom: 1rem; }

        /* PIANO */
        .piano { display: flex; height: 140px; margin: 1rem 0 0.5rem 0; border-radius: 12px; overflow: hidden; background: #111; padding: 4px; }
        .piano-key { flex: 1; border: 1px solid #333; border-radius: 0 0 6px 6px; cursor: pointer; transition: background 0.05s; }
        .piano-key.white { background: #f0f0f0; border-bottom: 3px solid #aaa; }
        .piano-key.white:active, .piano-key.white.active { background: #c0c0c0; border-bottom-width: 1px; transform: translateY(2px); }
        .piano-key.black { background: #2a2a2a; border-bottom: 3px solid #555; width: 60%; margin-left: -20%; margin-right: -20%; z-index: 2; height: 60%; align-self: flex-start; border-radius: 0 0 4px 4px; }
        .piano-key.black:active, .piano-key.black.active { background: #444; border-bottom-width: 1px; transform: translateY(2px); }

        .piano-row { display: flex; position: relative; gap: 0; }
        .piano-key-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; height: 140px; }
        .piano-key-wrapper .white { width: 100%; height: 100%; }
        .piano-key-wrapper .black { position: absolute; top: 0; right: -12%; width: 24%; height: 55%; z-index: 2; }
        .piano-key-label { font-size: 0.5rem; color: #888; margin-top: 4px; pointer-events: none; text-align: center; }
    </style>
</head>
<body>
<div id="app">
    <h1>🐾 <span>Zenith</span> · WASM</h1>
    <div class="status" id="status">Loading...</div>

    <div class="row">
        <button id="noteOn">▶ Note On (A4)</button>
        <button id="noteOff">■ Note Off</button>
    </div>

    <!-- PIANO -->
    <div class="piano" id="piano"></div>

    <div class="grid-3">
        <div class="knob-group"><label>Wave</label><select id="waveform"><option value="0">Sine</option><option value="1">Saw</option><option value="2">Square</option><option value="3">Triangle</option></select></div>
        <div class="knob-group"><label>Freq</label><input type="range" id="freq" min="20" max="2000" value="440" step="1"><span id="freqVal" style="font-size:0.7rem;color:#c084fc;">440</span></div>
        <div class="knob-group"><label>Cutoff</label><input type="range" id="cutoff" min="20" max="20000" value="8000" step="10"><span id="cutoffVal" style="font-size:0.7rem;color:#c084fc;">8000</span></div>
        <div class="knob-group"><label>Resonance</label><input type="range" id="resonance" min="0" max="1.5" value="0.5" step="0.01"><span id="resonanceVal" style="font-size:0.7rem;color:#c084fc;">0.50</span></div>
        <div class="knob-group"><label>Attack</label><input type="range" id="attack" min="0.001" max="2" value="0.1" step="0.001"><span id="attackVal" style="font-size:0.7rem;color:#c084fc;">0.10</span></div>
        <div class="knob-group"><label>Release</label><input type="range" id="release" min="0.001" max="2" value="0.3" step="0.001"><span id="releaseVal" style="font-size:0.7rem;color:#c084fc;">0.30</span></div>
    </div>

    <div class="row" style="margin-top:0.5rem;">
        <button id="panicBtn" style="background:#e74c3c;color:white;">⛔ PANIC</button>
    </div>
</div>

<script type="module">
    import init, { ZenithDSP } from './wasm/zenith_dsp.js';

    let audioCtx, dsp, scriptNode;
    let activeNotes = new Set();

    const status = document.getElementById('status');
    const noteOnBtn = document.getElementById('noteOn');
    const noteOffBtn = document.getElementById('noteOff');
    const panicBtn = document.getElementById('panicBtn');

    // --- piano ---
    const noteNames = ['C4', 'C#4', 'D4', 'D#4', 'E4', 'F4', 'F#4', 'G4', 'G#4', 'A4', 'A#4', 'B4'];
    const midiNotes = [60, 61, 62, 63, 64, 65, 66, 67, 68, 69, 70, 71];
    const pianoContainer = document.getElementById('piano');

    function buildPiano() {
        const wrapper = document.createElement('div');
        wrapper.style.cssText = 'display:flex; width:100%; height:100%; position:relative;';
        noteNames.forEach((name, i) => {
            const isBlack = name.includes('#');
            const key = document.createElement('div');
            key.className = `piano-key ${isBlack ? 'black' : 'white'}`;
            key.dataset.midi = midiNotes[i];
            key.dataset.note = name;
            key.style.flex = isBlack ? '0 0 0' : '1';
            key.style.position = isBlack ? 'relative' : 'static';
            key.style.marginLeft = isBlack ? '-12%' : '0';
            key.style.marginRight = isBlack ? '-12%' : '0';
            key.style.zIndex = isBlack ? '2' : '1';
            key.style.height = isBlack ? '60%' : '100%';
            key.style.alignSelf = isBlack ? 'flex-start' : 'stretch';
            key.style.borderRadius = isBlack ? '0 0 4px 4px' : '0 0 6px 6px';
            // touch / mouse
            key.addEventListener('mousedown', (e) => { e.preventDefault(); startNote(midiNotes[i]); });
            key.addEventListener('mouseup', (e) => { e.preventDefault(); stopNote(midiNotes[i]); });
            key.addEventListener('mouseleave', () => { stopNote(midiNotes[i]); });
            key.addEventListener('touchstart', (e) => { e.preventDefault(); startNote(midiNotes[i]); });
            key.addEventListener('touchend', (e) => { e.preventDefault(); stopNote(midiNotes[i]); });
            key.addEventListener('touchcancel', (e) => { e.preventDefault(); stopNote(midiNotes[i]); });
            // label
            const label = document.createElement('div');
            label.className = 'piano-key-label';
            label.textContent = name.replace('#', '♯');
            key.appendChild(label);
            wrapper.appendChild(key);
        });
        pianoContainer.appendChild(wrapper);
    }
    buildPiano();

    // --- DSP ---
    async function initDSP() {
        try {
            await init();
            audioCtx = new AudioContext();
            dsp = new ZenithDSP();
            dsp.setSampleRate(audioCtx.sampleRate);
            syncParams();

            scriptNode = audioCtx.createScriptProcessor(256, 0, 1);
            scriptNode.onaudioprocess = (e) => {
                if (!dsp) return;
                const output = e.outputBuffer.getChannelData(0);
                for (let i = 0; i < output.length; i++) {
                    output[i] = dsp.getNextSample();
                }
            };
            scriptNode.connect(audioCtx.destination);
            status.textContent = '✅ Ready — tap piano keys';
        } catch (e) {
            status.textContent = '❌ Failed to load WASM';
            console.error(e);
        }
    }

    function syncParams() {
        if (!dsp) return;
        dsp.setWaveform(parseInt(document.getElementById('waveform').value));
        dsp.setFrequency(parseFloat(document.getElementById('freq').value));
        dsp.setCutoff(parseFloat(document.getElementById('cutoff').value));
        dsp.setResonance(parseFloat(document.getElementById('resonance').value));
        dsp.setAttack(parseFloat(document.getElementById('attack').value));
        dsp.setRelease(parseFloat(document.getElementById('release').value));
    }

    function startNote(midi) {
        if (!dsp || !audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const freq = 440 * Math.pow(2, (midi - 69) / 12);
        dsp.setFrequency(freq);
        dsp.noteOn();
        activeNotes.add(midi);
        // highlight key
        document.querySelectorAll('.piano-key').forEach(el => {
            if (parseInt(el.dataset.midi) === midi) el.classList.add('active');
        });
        status.textContent = `🔊 Note ON ${midi}`;
    }

    function stopNote(midi) {
        if (!dsp) return;
        dsp.noteOff();
        activeNotes.delete(midi);
        document.querySelectorAll('.piano-key').forEach(el => {
            if (parseInt(el.dataset.midi) === midi) el.classList.remove('active');
        });
        status.textContent = `🔇 Note OFF ${midi}`;
    }

    function panic() {
        if (!dsp) return;
        dsp.noteOff();
        activeNotes.clear();
        document.querySelectorAll('.piano-key').forEach(el => el.classList.remove('active'));
        status.textContent = '⛔ Panic! All notes off';
    }

    // --- UI bindings ---
    document.querySelectorAll('input, select').forEach(el => {
        el.addEventListener('input', syncParams);
        el.addEventListener('change', syncParams);
    });
    document.querySelectorAll('input[type="range"]').forEach(el => {
        el.addEventListener('input', () => {
            const val = document.getElementById(el.id + 'Val');
            if (val) val.textContent = parseFloat(el.value).toFixed(2);
        });
    });

    noteOnBtn.onclick = () => { if (dsp) { dsp.noteOn(); status.textContent = '🔊 Note ON (manual)'; } };
    noteOffBtn.onclick = () => { if (dsp) { dsp.noteOff(); status.textContent = '🔇 Note OFF'; } };
    panicBtn.onclick = panic;

    initDSP();
</script>
</body>
</html>
